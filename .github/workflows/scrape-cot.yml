name: Scrape COT

on:
  schedule:
    # Friday at 17:00 UTC
    - cron: "0 17 * * 5"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-scrape even if report already exists"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger COT scraper
        run: |
          FORCE="${{ github.event.inputs.force || 'false' }}"
          URL="${{ secrets.SUPABASE_URL }}/functions/v1/scrape-cot?force=${FORCE}"

          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "$URL" \
            -d '{}')

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 200 ]; then
            echo "::error::COT scrape failed with status $http_code"
            exit 1
          fi
